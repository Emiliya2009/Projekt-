<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proste To-Do</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todo">
      <h1>Moje zadania</h1>

      <div class="row">
        <input
          id="taskInput"
          type="text"
          placeholder="Na przykład: zrobić pracę domową"
          
        />
        <button onclick="addTask()">Dodaj</button>
      </div>

      <p id="emptyText">Lista jest pusta</p>
      <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
  </body>
</html>
